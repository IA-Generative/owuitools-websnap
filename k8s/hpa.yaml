apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: browser-use
  namespace: browser-use
  labels:
    app.kubernetes.io/name: browser-use
    app.kubernetes.io/component: extraction-service
    app.kubernetes.io/managed-by: kubectl
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: browser-use
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
  # To add custom metrics (e.g., RPS, latency), use KEDA or prometheus-adapter:
  # - type: Pods
  #   pods:
  #     metric:
  #       name: http_requests_per_second
  #     target:
  #       type: AverageValue
  #       averageValue: "100"
