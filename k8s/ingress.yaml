apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: websnap
  namespace: websnap
  labels:
    app.kubernetes.io/name: websnap
    app.kubernetes.io/component: extraction-service
    app.kubernetes.io/managed-by: kubectl
  annotations:
    # nginx ingress controller
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # Traefik alternative (uncomment if using Traefik):
    # traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - websnap.example.com
      secretName: websnap-tls  # Replace with your TLS cert secret name
  rules:
    - host: websnap.example.com  # Replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: websnap
                port:
                  number: 80
