# Deployment 1: websnap (lightweight, no Playwright)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: websnap
  namespace: websnap
  labels:
    app.kubernetes.io/name: websnap
    app.kubernetes.io/component: extraction-service
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: websnap
      app.kubernetes.io/component: extraction-service-light
  template:
    metadata:
      labels:
        app.kubernetes.io/name: websnap
        app.kubernetes.io/component: extraction-service-light
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
                      - arm64
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: websnap
      containers:
        - name: websnap
          image: ghcr.io/your-org/websnap:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: websnap-config
            - secretRef:
                name: websnap-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
---
# Deployment 2: websnap-full (with Playwright/Chromium)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: websnap-full
  namespace: websnap
  labels:
    app.kubernetes.io/name: websnap
    app.kubernetes.io/component: extraction-service
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: websnap
      app.kubernetes.io/component: extraction-service-full
  template:
    metadata:
      labels:
        app.kubernetes.io/name: websnap
        app.kubernetes.io/component: extraction-service-full
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
                      - arm64
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: websnap
      containers:
        - name: websnap-full
          image: ghcr.io/your-org/websnap-full:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: websnap-config
            - secretRef:
                name: websnap-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            # Playwright needs /tmp writes — readOnlyRootFilesystem NOT set
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
