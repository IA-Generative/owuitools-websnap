name: websnap
version: "1.0.0"

services:
  - name: websnap
    port: 8086
  - name: websnap-full
    port: 8086

pipelines:
  files: []

tools:
  entries:
    - id: websnap
      source_file: app/openwebui_tool.py
      service_name: websnap
      service_port: 8086
      methods:
        - websnap
        - screenshot
        - compare_urls
    - id: vision_image_filter
      source_file: app/openwebui_vision_filter.py
      service_name: websnap
      service_port: 8086

model_tools: []

env_vars: []

k8s:
  namespace: websnap
  custom_image: true
