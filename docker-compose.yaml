# websnap — Feature service
#
# Mode modulaire (socle lancé séparément) :
#   docker compose up -d

services:
  websnap:
    build:
      context: .
      dockerfile: docker/Dockerfile.browser
    ports:
      - "8086:8000"
    env_file:
      - .env
    environment:
      PROXY_URL: ${PROXY_URL:-}
    restart: unless-stopped
    networks:
      - owui-net
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/healthz').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  owui-net:
    external: true
